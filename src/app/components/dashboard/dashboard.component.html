@if (users && users.length > 0)
{
  <div>
    <table>
      <thead>
      <tr>
        <th>Username</th>
        <th>Created Date</th>
        <th>Name</th>
      </tr>
      </thead>
      <tbody>
        @for (user of users; track user.username)
        {
          <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.created_at }}</td>
            <td>{{ user.name }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
} @else {
  <ng-template #noUsers>
    <p>No users found.</p>
  </ng-template>
}
